  	<div id="topBar" data-scroll="false" class="menubar">
  		<div class="desktopOnly hide-empty">

                <p class="currentTime label tooltip-attr tooltip-attr-bottom" data-tooltip="One week lasts ~ 30min and one year is 48 weeks or 24 hours in realtime. "></p>
                <p class="tooltip-attr tooltip-attr-bottom" data-tooltip="An estimate of how long until next week."><img src='@routes.Assets.versioned("/images/icons/clock-moon-phase.png")' style="vertical-align: middle;"><span class="nextTickEstimation label" style="font-weight: bold;">Estimating...</span></p>
                <p class="tooltip-attr tooltip-attr-bottom" data-tooltip="Cash money">$<span class="balance"></span></p>
                <p class="tooltip-attr tooltip-attr-bottom actionPoints" data-tooltip="Action Points"></p>
                
                <div id="notificationBell" class="clickable relative pr-4" title="Notifications">
                    <p style="font-size: 13px;" class="currentAirline label font-display"></p>
                    <span class="notify-bubble" id="notificationBadge" style="display:none;"></span>
                    <div id="notificationDrawer" class="notification-drawer" popover="manual">
                        <div class="drawer-header">
                            Notifications
                            <span class="mark-read-link ml-auto pr-1">Mark all read</span>
                            <span class="opacity-30">/</span>
                            <span class="delete-read-link pl-1">Delete all read</span>
                        </div>
                        <div id="notificationList"></div>
                    </div>
                </div>
                <div class="reputationStars" id="topReputationStars"></div>
                <div title="Latest Oil Price" class="latestOilPriceShortCut clickable" onclick="showOilCanvas()">
                    <img src='@routes.Assets.versioned("/images/icons/oil-barrel.png")'>
                    <span class="oilprice label"></span>
				</div>
  			</div>
  		</div>
		<div class="mobileOnly">

                <span id="notificationBellMobile" class="clickable" style="position:relative; margin-left: 4px;" title="Notifications">
                    <img src='@routes.Assets.versioned("/images/icons/book-open-text.png")' style="width: 18px; vertical-align: middle;">
                    <span class="notify-bubble notify-bubble-mobile" style="display:none;"></span>
                </span>
			</div>
		</div>
  		<div class="flex-align-center">

				<div id="airlineSwitcherBtn" class="button desktopOnly" style="display:none; width:90px">Switch</div>
				<div id="airlineSwitcherBtnMobile" class="mobileOnly" style="display:none;"><img src='@routes.Assets.versioned("images/icons/24px/arrow-circle-double.png")' title="Switch Airline" style="width:20px;"></div>

					<div id="airlineSwitcherList"></div>

				<div class="button desktopOnly" onclick="logout()" style="width:90px">Logout</div>
				<div class="mobileOnly" onclick="logout()"><img src='@routes.Assets.versioned("images/icons/24px/logout.png")' title="Login"></div>

			<div class="topBarItem no-highlight" id="discordDiv">
