# Minimal config for actor unit tests.
# Uses port 12553 so tests can run alongside the running app (port 2553).

play.allowGlobalApplication = true

websocketActorSystem {
  pekko {
    actor {
      provider = remote
      allow-java-serialization = on
      warn-about-java-serializer-usage = false
    }
    remote {
      artery {
        transport = tcp
        canonical {
          hostname = "127.0.0.1"
          port = 12553
        }
        bind {
          hostname = "127.0.0.1"
          port = 12553
        }
      }
    }
  }
}

my-pinned-dispatcher {
  executor = "thread-pool-executor"
  type = PinnedDispatcher
}
