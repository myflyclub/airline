name: Production Deploy
run-name: ${{ github.actor }} prod deploy 🚀
on:
  push:
    branches:
      - master

jobs:
  build:
    name: Release and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate New Secret and Update application.conf
        shell: bash
        env:
          DB_USER: ${{ secrets.production_user }}
          DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
        run: |
          # Generate a new secret
          CRYPTO_SECRET=$(uuidgen)
          HTTP_SECRET=$(uuidgen)
          echo "Generated secret for deployment: $CRYPTO_SECRET and $HTTP_SECRET"

          # Update play secrets in airline-web/conf/application.conf
          sed -i.bak "s/\(play\.crypto\.secret *= *\"\)changeme\(\".*\)/\1${CRYPTO_SECRET}\2/" airline-web/conf/application.conf
          sed -i.bak "s/\(play\.http\.secret\.key *= *\"\)changeme\(\".*\)/\1${HTTP_SECRET}\2/" airline-web/conf/application.conf

          # Update mysqldb credentials in airline-web/conf/application.conf
          sed -i.bak "s/\(user *= *\"\)root\(\"\)/\1${DB_USER}\2/" airline-web/conf/application.conf
          sed -i.bak "s/\(password *= *\"\)\(\"\)/\1${DB_PASSWORD}\2/" airline-web/conf/application.conf

          # Update mysqldb credentials in airline-data/src/main/resources/application.conf
          sed -i.bak "s/\(user *= *\"\)root\(\"\)/\1${DB_USER}\2/" airline-data/src/main/resources/application.conf
          sed -i.bak "s/\(password *= *\"\)\(\"\)/\1${DB_PASSWORD}\2/" airline-data/src/main/resources/application.conf

          grep 'play.crypto.secret' airline-web/conf/application.conf

      - name: SCP to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.production_host }}
          username: ${{ secrets.production_user }}
          key: ${{ secrets.production_key }}
          port: 22
          source: "."
          strip_components: 0
          target: "/var/www/myfly/"

      - name: Build java, restart server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.production_host }}
          username: ${{ secrets.production_user }}
          key: ${{ secrets.production_key }}
          port: 22
          script_stop: true
          script: |
            cd /var/www/myfly/airline-data/
            sbt clean publishLocal

            # Kill any existing tmux sessions
            tmux kill-server || true

            # Start data simulation (select option 1 from sbt run menu)
            tmux new-session -d -s data -c /var/www/myfly/airline-data
            tmux send-keys -t data "sbt 'runMain com.patson.MainSimulation'" Enter

            # Start web app
            tmux new-session -d -s web -c /var/www/myfly/airline-web
            tmux send-keys -t web "sbt run" Enter
