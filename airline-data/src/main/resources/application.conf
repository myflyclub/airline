websocketActorSystem {
	pekko {
		actor {
			provider = remote
			allow-java-serialization = on
			warn-about-java-serializer-usage = false
		}
		remote {
			artery {
				transport = tcp
				canonical {
					#private IP of this server
					hostname = "127.0.0.1"
					port = 2552
				}
				bind {
					hostname = "127.0.0.1"
					port = 2552
				}
	    	}
		}
	}
}

mysqldb {
    host = "localhost:3306"
    schema = "airline"
    user = "root"
    password = ""
}

hikari.maxPoolSize = 8
hikari.connectionTimeout = 90000
hikari.metricsEnabled = true
hikari.metricsIntervalSeconds = 30
hikari.slowQueryThresholdMs = 1000
